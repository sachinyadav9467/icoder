        crossorigin="anonymous"></script>
</body>
<script>
   let array=[];
   let i=0,j=0;
let color=["primary","secondary","success","info","warning","danger","light"]
    document.getElementById("inputvar").addEventListener('keyup', function(event) {
  // Number 13 is the "Enter" key on the keyboard
  if (event.keyCode === 13) {
      add();
  }
})
    document.getElementById("add_button").addEventListener('click', add);
    document.getElementsByClassName("close_button")
    function add() {
        let input=document.getElementById("inputvar").value;
        array[i]=`${input}`;
        let str=document.getElementById("listbody").innerHTML;
        str+=`<li id="button${i}" class="list-group-item list-group-item-${color[j]} w-40">${input}<button onclick="close(${i})"
         type="button" class="btn-close position-absolute end-0 close_button " aria-label="Close"></button></li>`;
        document.getElementById("listbody").innerHTML=str;
        i++;
        if(j<6)
        j++;
        else
        j=0;
        
        document.getElementById("inputvar").value="";
    }
    function close(key)
    {
    console.log("hi");
    document.getElementById(`button${key}`).remove;
    }
</script>
